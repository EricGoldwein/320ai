<!DOCTYPE html>
<html>
<head>
    <title>Daisy's Yellowstone Adventure</title>
<style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #87CEEB;
            font-family: Arial, sans-serif;
        }
        canvas {
            border: 2px solid #333;
            background: #87CEEB;
        }
        #gameContainer {
    position: relative;
}
        #score {
    position: absolute;
            top: 20px;
            left: 20px;
            font-size: 24px;
            color: #333;
            font-weight: bold;
        }
        #pauseOverlay {
            display: none;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }
        #mobileControls {
    display: none;
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
        }
        .mobile-button {
            display: inline-block;
            padding: 10px 20px;
            margin: 0 5px;
            background: rgba(255, 255, 255, 0.7);
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }
        @media (max-width: 768px) {
            #mobileControls {
                display: block;
            }
}
</style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        <div id="score">WINGOS: 0</div>
        <div id="pauseOverlay">
            <h2>PAUSED</h2>
            <p>Press 'R' to resume</p>
        </div>
        <div id="mobileControls">
            <button class="mobile-button" id="jumpButton">JUMP</button>
            <button class="mobile-button" id="pauseButton">PAUSE</button>
    </div>
    </div>
<script>
// Game constants
const CANVAS_WIDTH = 800;
        const CANVAS_HEIGHT = 400;
        const GRAVITY = 0.5;
        const JUMP_FORCE = -12;
        const DOUBLE_JUMP_FORCE = -10;
        const GROUND_HEIGHT = 50;
        const GAME_SPEED = 5;
        const OBSTACLE_SPACING = 300;
        const RIVAL_SPACING = 400;
        const COLLECTIBLE_SPACING = 200;
        const DOUBLE_JUMP_POINTS = 10;
        const COMBO_MULTIPLIER = 1.5;
        const COMBO_TIMEOUT = 2000;
        const VICTORY_POINTS = 320;

// Game state
let canvas, ctx;
let daisy = {
            x: 100,
            y: CANVAS_HEIGHT - GROUND_HEIGHT - 50,
            width: 40,
            height: 50,
    velocityY: 0,
    isJumping: false,
            canDoubleJump: false,
            hasDoubleJumped: false,
            isInvincible: false,
            invincibilityTimer: 0,
            invincibilityDuration: 5000
        };
let obstacles = [];
        let rivals = [];
        let collectibles = [];
        let score = 0;
        let combo = 0;
        let lastComboTime = 0;
        let gameSpeed = GAME_SPEED;
        let isPaused = false;
        let isGameOver = false;
        let isVictory = false;
        let particles = [];
        let frameCount = 0;
        let lastObstacleX = CANVAS_WIDTH;
        let lastRivalX = CANVAS_WIDTH;
        let lastCollectibleX = CANVAS_WIDTH;
        let lastMessage = '';
        let messageTimer = 0;
        let messageDuration = 1000;
        let isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

// Initialize game
function init() {
            canvas = document.getElementById('gameCanvas');
            ctx = canvas.getContext('2d');
    canvas.width = CANVAS_WIDTH;
    canvas.height = CANVAS_HEIGHT;

            // Add initial collectibles
            addInitialCollectibles();

            // Mobile controls
            if (isMobile) {
                document.getElementById('jumpButton').addEventListener('touchstart', () => {
                    if (!isPaused && !isGameOver && !isVictory) {
                        jump();
                    }
                });
                document.getElementById('pauseButton').addEventListener('touchstart', togglePause);
            }

            // Keyboard controls
            document.addEventListener('keydown', (e) => {
                if (e.code === 'Space' && !isPaused && !isGameOver && !isVictory) {
                    jump();
                } else if (e.code === 'KeyP') {
                    togglePause();
                } else if (e.code === 'KeyR' && isPaused) {
                    togglePause();
                }
            });

        // Start game loop
        requestAnimationFrame(gameLoop);
        }

        // Add initial collectibles
        function addInitialCollectibles() {
            const numCollectibles = Math.floor(Math.random() * 3) + 3; // 3-5 collectibles
            for (let i = 0; i < numCollectibles; i++) {
                const x = CANVAS_WIDTH + (i * COLLECTIBLE_SPACING);
                const y = CANVAS_HEIGHT - GROUND_HEIGHT - 100 - (Math.random() * 100);
                const type = Math.random() < 0.5 ? 'creatine' : 'carbon-plates';
                collectibles.push({
                    x: x,
                    y: y,
                    width: 30,
                    height: 30,
                    type: type,
                    collected: false
                });
            }
        }

        // Game loop
        function gameLoop(timestamp) {
            if (!isPaused && !isGameOver && !isVictory) {
        update();
    }
    draw();
            frameCount++;
    requestAnimationFrame(gameLoop);
}

        // Update game state
function update() {
    // Update Daisy
        daisy.velocityY += GRAVITY;
        daisy.y += daisy.velocityY;

            // Ground collision
            if (daisy.y > CANVAS_HEIGHT - GROUND_HEIGHT - daisy.height) {
                daisy.y = CANVAS_HEIGHT - GROUND_HEIGHT - daisy.height;
            daisy.velocityY = 0;
            daisy.isJumping = false;
                daisy.canDoubleJump = false;
                daisy.hasDoubleJumped = false;
            }

            // Update invincibility
            if (daisy.isInvincible) {
                daisy.invincibilityTimer--;
                if (daisy.invincibilityTimer <= 0) {
                    daisy.isInvincible = false;
                }
            }

            // Update obstacles
            obstacles.forEach(obstacle => {
                obstacle.x -= gameSpeed;
            });
            obstacles = obstacles.filter(obstacle => obstacle.x > -obstacle.width);

            // Update rivals
            rivals.forEach(rival => {
                rival.x -= gameSpeed;
                rival.bounceOffset = Math.sin(frameCount * 0.1 + rival.x * 0.01) * 5;
            });
            rivals = rivals.filter(rival => rival.x > -rival.width);

            // Update collectibles
            collectibles.forEach(collectible => {
                collectible.x -= gameSpeed;
                collectible.y += Math.sin(frameCount * 0.1 + collectible.x * 0.01) * 2;
            });
            collectibles = collectibles.filter(collectible => collectible.x > -collectible.width);

            // Spawn new obstacles
            if (lastObstacleX - canvas.width > OBSTACLE_SPACING) {
                const height = Math.random() * 100 + 50;
                obstacles.push({
                    x: canvas.width,
                    y: CANVAS_HEIGHT - GROUND_HEIGHT - height,
                    width: 30,
                    height: height
                });
                lastObstacleX = canvas.width;
            }

            // Spawn new rivals
            if (lastRivalX - canvas.width > RIVAL_SPACING) {
                rivals.push({
                    x: canvas.width,
                    y: CANVAS_HEIGHT - GROUND_HEIGHT - 40,
                    width: 30,
                    height: 40,
                    bounceOffset: 0
                });
                lastRivalX = canvas.width;
            }

            // Spawn new collectibles
            if (lastCollectibleX - canvas.width > COLLECTIBLE_SPACING) {
                const y = CANVAS_HEIGHT - GROUND_HEIGHT - 100 - (Math.random() * 100);
                const type = Math.random() < 0.5 ? 'creatine' : 'carbon-plates';
                collectibles.push({
                    x: canvas.width,
                    y: y,
                    width: 30,
                    height: 30,
                    type: type,
                    collected: false
                });
                lastCollectibleX = canvas.width;
            }

            // Update last positions
            lastObstacleX -= gameSpeed;
            lastRivalX -= gameSpeed;
            lastCollectibleX -= gameSpeed;

            // Check collisions
            checkCollisions();

            // Update score
            score += 0.1;
            document.getElementById('score').textContent = `WINGOS: ${Math.floor(score)}`;

            // Check for victory
            if (score >= VICTORY_POINTS && !isVictory) {
                startVictoryDance();
            }

            // Update message timer
            if (messageTimer > 0) {
                messageTimer--;
            }
        }

        // Check collisions
        function checkCollisions() {
            // Obstacle collisions
            obstacles.forEach(obstacle => {
                if (checkCollision(daisy, obstacle) && !daisy.isInvincible) {
                gameOver();
            }
            });

            // Rival collisions
            rivals.forEach(rival => {
                if (checkCollision(daisy, rival) && !daisy.isInvincible) {
                    gameOver();
                }
            });

            // Collectible collisions
            collectibles.forEach(collectible => {
                if (!collectible.collected && checkCollision(daisy, collectible)) {
                    collectible.collected = true;
                    if (collectible.type === 'creatine') {
                        daisy.isInvincible = true;
                        daisy.invincibilityTimer = daisy.invincibilityDuration;
                        showMessage('CREATINE POWER! INVINCIBLE!');
                        createParticles(collectible.x, collectible.y, '#FF00FF');
                    } else if (collectible.type === 'carbon-plates') {
                        score += 50;
                        showMessage('CARBON PLATES! +50 WINGOS!');
                        createParticles(collectible.x, collectible.y, '#00FF00');
                    }
                }
            });
        }

        // Check collision between two rectangles
        function checkCollision(rect1, rect2) {
            return rect1.x < rect2.x + rect2.width &&
                   rect1.x + rect1.width > rect2.x &&
                   rect1.y < rect2.y + rect2.height &&
                   rect1.y + rect1.height > rect2.y;
        }

        // Jump function
        function jump() {
            if (!daisy.isJumping) {
                daisy.velocityY = JUMP_FORCE;
                daisy.isJumping = true;
                daisy.canDoubleJump = true;
                createDustParticles();
            } else if (daisy.canDoubleJump && !daisy.hasDoubleJumped) {
                daisy.velocityY = DOUBLE_JUMP_FORCE;
                daisy.hasDoubleJumped = true;
                daisy.canDoubleJump = false;
                score += DOUBLE_JUMP_POINTS;
                showMessage('SECOND WIND! 320 POWER!');
                createParticles(daisy.x, daisy.y, '#FFD700');
            }
        }

        // Create dust particles
        function createDustParticles() {
            for (let i = 0; i < 5; i++) {
                particles.push({
                    x: daisy.x,
                    y: daisy.y + daisy.height,
                    vx: (Math.random() - 0.5) * 2,
                    vy: Math.random() * 2,
                    life: 20,
                    color: '#8B4513'
                });
            }
        }

        // Create particles
        function createParticles(x, y, color) {
            for (let i = 0; i < 10; i++) {
                particles.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 4,
                    vy: (Math.random() - 0.5) * 4,
                    life: 30,
                    color: color
                });
            }
        }

        // Show message
        function showMessage(text) {
            lastMessage = text;
            messageTimer = messageDuration;
        }

        // Toggle pause
        function togglePause() {
            isPaused = !isPaused;
            document.getElementById('pauseOverlay').style.display = isPaused ? 'block' : 'none';
            document.getElementById('pauseButton').textContent = isPaused ? 'RESUME' : 'PAUSE';
        }

        // Game over
        function gameOver() {
            isGameOver = true;
            const messages = [
                "GAME OVER! TIME TO HIT THE TRACK AGAIN!",
                "BETTER LUCK NEXT TIME! KEEP TRAINING!",
                "ALMOST THERE! TRY AGAIN!",
                "NOT THIS TIME! BUT YOU'RE GETTING CLOSER!",
                "KEEP PUSHING! YOU'VE GOT THIS!"
            ];
            showMessage(messages[Math.floor(Math.random() * messages.length)]);
        }

        // Start victory dance
        function startVictoryDance() {
            isVictory = true;
            showMessage('VICTORY! 320 WINGOS ACHIEVED!');
            createFireworks();
        }

        // Create fireworks
        function createFireworks() {
            for (let i = 0; i < 5; i++) {
                setTimeout(() => {
                    const x = Math.random() * canvas.width;
                    const y = Math.random() * (canvas.height / 2);
                    for (let j = 0; j < 20; j++) {
                        particles.push({
                            x: x,
                            y: y,
                            vx: (Math.random() - 0.5) * 8,
                            vy: (Math.random() - 0.5) * 8,
                            life: 40,
                            color: `hsl(${Math.random() * 360}, 100%, 50%)`
                        });
                    }
                }, i * 500);
            }
        }

        // Draw game
        function draw() {
            // Clear canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw ground
            ctx.fillStyle = 'transparent';
            ctx.fillRect(0, CANVAS_HEIGHT - GROUND_HEIGHT, canvas.width, GROUND_HEIGHT);

            // Draw obstacles
            ctx.fillStyle = '#8B4513';
            obstacles.forEach(obstacle => {
                ctx.fillRect(obstacle.x, obstacle.y, obstacle.width, obstacle.height);
            });

            // Draw rivals
            rivals.forEach(rival => {
        ctx.save();
                ctx.translate(rival.x + rival.width/2, rival.y + rival.height/2 + rival.bounceOffset);
                ctx.rotate(Math.sin(frameCount * 0.1 + rival.x * 0.01) * 0.2);
                ctx.fillStyle = '#FF0000';
                ctx.fillRect(-rival.width/2, -rival.height/2, rival.width, rival.height);
                ctx.fillStyle = '#FFFFFF';
                ctx.font = '12px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('RIVAL', 0, -rival.height/2 - 5);
        ctx.restore();
    });

            // Draw collectibles
            collectibles.forEach(collectible => {
                if (!collectible.collected) {
                    ctx.fillStyle = collectible.type === 'creatine' ? '#FF00FF' : '#00FF00';
                    ctx.beginPath();
                    ctx.arc(collectible.x + collectible.width/2, collectible.y + collectible.height/2, collectible.width/2, 0, Math.PI * 2);
                    ctx.fill();
                }
            });

            // Draw Daisy
            ctx.save();
            ctx.translate(daisy.x + daisy.width/2, daisy.y + daisy.height/2);
            ctx.rotate(Math.sin(frameCount * 0.1) * 0.1);
            ctx.fillStyle = '#FFD700';
            ctx.fillRect(-daisy.width/2, -daisy.height/2, daisy.width, daisy.height);
            if (daisy.isInvincible) {
                ctx.strokeStyle = '#FFD700';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.arc(0, 0, daisy.width * 0.8, 0, Math.PI * 2);
                ctx.stroke();
            }
            ctx.restore();

            // Draw particles
            particles.forEach((particle, index) => {
                particle.x += particle.vx;
                particle.y += particle.vy;
                particle.life--;
                if (particle.life <= 0) {
                    particles.splice(index, 1);
                } else {
                    ctx.fillStyle = particle.color;
                    ctx.globalAlpha = particle.life / 30;
                    ctx.beginPath();
                    ctx.arc(particle.x, particle.y, 2, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.globalAlpha = 1;
                }
            });

            // Draw message
            if (messageTimer > 0) {
                ctx.fillStyle = '#FFFFFF';
                ctx.font = '24px Arial';
                ctx.textAlign = 'center';
                ctx.fillText(lastMessage, canvas.width/2, 50);
            }

            // Draw game over or victory message
            if (isGameOver || isVictory) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#FFFFFF';
                ctx.font = '48px Arial';
                ctx.textAlign = 'center';
                ctx.fillText(isVictory ? 'VICTORY!' : 'GAME OVER!', canvas.width/2, canvas.height/2);
                ctx.font = '24px Arial';
                ctx.fillText(`Final Score: ${Math.floor(score)} WINGOS`, canvas.width/2, canvas.height/2 + 50);
                ctx.fillText('Press Space to Restart', canvas.width/2, canvas.height/2 + 100);
            }
        }

        // Start game
        init();
</script>
</body>
</html>
